{% extends "base.html" %}

{% block title %}Player Profile - FPL Intelligence{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <!-- Back buton to go back to the page the user wws on before the players page -->
    <div class="container mb-3">
        <button onclick="history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </button>
    </div>

    <!-- The Spinner shows while waiting for the api response -->
    <!-- The spinner is hidden when the the api response is received -->
    <div id="loading" class="loading">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading</span>
        </div>
        <p class="mt-3 text-muted">Loading player data</p>
    </div>

    <!-- Player Profile Container -->
    <div id="playerProfile" style="display: none;">
        <!-- is populated by JavaScript -->
    </div>

    <!-- Error Message is shown if api fails to load predictions -->
    <div id="errorMessage" class="alert alert-danger" style="display: none;">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="errorText"></span>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Getting the player id from the URL
    const playerId = parseInt('{{ player_id }}', 10);
    
    // Checking if the player id is valid, if not showing an error message, if valid loading the player data
    if (!playerId || isNaN(playerId)) {
        showError('Invalid player ID');
        document.getElementById('loading').style.display = 'none';
    } else {
        // Event listener to load the player data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadPlayerData();
        });
    }

    // Function to load the player data
    function loadPlayerData() {
        fetch(`/api/player/${playerId}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    displayPlayer(data.player);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('playerProfile').style.display = 'block';
                } else {
                    showError(data.message || 'Player not found');
                }
            })
            .catch(error => {
                showError('Error loading player data: ' + error.message);
            });
    }

    // Function to display the player profile
    function displayPlayer(player) {
        const container = document.getElementById('playerProfile');

        // Getting the position badge class
        let positionClass = '';
        switch(player.position) {
            case 'GK': positionClass = 'bg-gk'; break;
            case 'DEF': positionClass = 'bg-def'; break;
            case 'MID': positionClass = 'bg-mid'; break;
            case 'FWD': positionClass = 'bg-fwd'; break;
        }

        let html = `
            <!-- Player Header Card -->
            <div class="card mb-4">
                <div class="card-body p-4">
                    <div class="row align-items-center">
                        <div class="col-md-2 text-center mb-3 mb-md-0">
                            <img src="${player.photo || 'https://via.placeholder.com/110x140?text=No+Photo'}" 
                                 alt="${player.name}" 
                                 class="img-fluid rounded"
                                 style="max-width: 110px;"
                                 onerror="this.src='https://via.placeholder.com/110x140?text=No+Photo'">
                        </div>
                        <div class="col-md-7">
                            <h1 class="mb-2">${player.name}</h1>
                            <p class="mb-2">
                                <span class="badge ${positionClass} me-2">${player.position}</span>
                                <span class="badge bg-secondary">${player.team}</span>
                            </p>
                            <h3 class="text-primary mb-0">£${player.price.toFixed(1)}m</h3>
                        </div>
                        <div class="col-md-3 text-center">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <h6 class="text-muted mb-1">Next GW Prediction</h6>
                                    <h2 class="text-primary mb-0">${Math.round(player.predicted_points)}</h2>
                                    <small class="text-muted">points</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="row mb-4">
                <!-- Season Stats -->
                <div class="col-lg-6 mb-4">
                    <div class="card h-100">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">
                                <i class="bi bi-bar-chart-fill"></i> Season Statistics
                            </h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-sm">
                                <tr>
                                    <td><strong>Total Points</strong></td>
                                    <td class="text-end">${player.total_points || 0}</td>
                                </tr>
                                <tr>
                                    <td><strong>Goals</strong></td>
                                    <td class="text-end">${player.goals_scored || 0}</td>
                                </tr>
                                <tr>
                                    <td><strong>Assists</strong></td>
                                    <td class="text-end">${player.assists || 0}</td>
                                </tr>
                                <tr>
                                    <td><strong>Minutes Played</strong></td>
                                    <td class="text-end">${player.minutes || 0}</td>
                                </tr>
                                <tr>
                                    <td><strong>Bonus Points</strong></td>
                                    <td class="text-end">${player.bonus || 0}</td>
                                </tr>
                                <tr>
                                    <td><strong>Clean Sheets</strong></td>
                                    <td class="text-end">${Math.round((player.clean_sheets_rolling_avg || 0) * 10)}</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ML Prediction Breakdown -->
                <div class="col-lg-6 mb-4">
                    <div class="card h-100">
                        <div class="card-header bg-success text-white">
                            <h5 class="mb-0">
                                <i class="bi bi-cpu-fill"></i> ML Prediction Factors
                            </h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-sm">
                                <tr>
                                    <td><strong>Form (Rolling Avg)</strong></td>
                                    <td class="text-end">
                                        ${player.rolling_avg_points.toFixed(1)} pts
                                        ${getIndicator(player.rolling_avg_points, 5)}
                                    </td>
                                </tr>
                                <tr>
                                    <td><strong>Opponent Difficulty</strong></td>
                                    <td class="text-end">
                                        ${player.opponent_difficulty.toFixed(1)}/5
                                        ${getDifficultyBadge(player.opponent_difficulty)}
                                    </td>
                                </tr>
                                <tr>
                                    <td><strong>Home/Away</strong></td>
                                    <td class="text-end">
                                        ${player.is_home === 1 
                                            ? '<span class="badge bg-success">Home</span>' 
                                            : player.is_home === 0 
                                                ? '<span class="badge bg-warning text-dark">Away</span>' 
                                                : '<span class="badge bg-secondary">Unknown</span>'}
                                    </td>
                                </tr>
                                <tr>
                                    <td><strong>Price</strong></td>
                                    <td class="text-end">£${player.price.toFixed(1)}m</td>
                                </tr>
                                <tr>
                                    <td><strong>Clean Sheet Prob.</strong></td>
                                    <td class="text-end">
                                        ${(player.clean_sheets_rolling_avg * 100).toFixed(0)}%
                                    </td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Ownership & Transfers -->
            <div class="row mb-4">
                <div class="col-lg-12">
                    <div class="card">
                        <div class="card-header bg-info text-white">
                            <h5 class="mb-0">
                                <i class="bi bi-people-fill"></i> Ownership & Transfer Trends
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="row text-center">
                                <div class="col-md-4">
                                    <h6 class="text-muted">Selected By</h6>
                                    <h3 class="text-primary">${player.selected_by_percent || '0'}%</h3>
                                    <small class="text-muted">of managers</small>
                                </div>
                                <div class="col-md-4">
                                    <h6 class="text-muted">Transfers In</h6>
                                    <h3 class="text-success">+${formatNumber(player.transfers_in || 0)}</h3>
                                    <small class="text-muted">last gameweek</small>
                                </div>
                                <div class="col-md-4">
                                    <h6 class="text-muted">Transfers Out</h6>
                                    <h3 class="text-danger">-${formatNumber(player.transfers_out || 0)}</h3>
                                    <small class="text-muted">last gameweek</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recommendation -->
            <div class="card">
                <div class="card-body text-center p-4" style="background: linear-gradient(135deg, var(--fpl-purple) 0%, #4a0052 100%); color: white;">
                    <h4 class="mb-3">
                        <i class="bi bi-lightbulb-fill"></i> AI Recommendation
                    </h4>
                    <p class="lead mb-0">
                        ${getRecommendation(player.predicted_points)}
                    </p>
                </div>
            </div>
        `;

        container.innerHTML = html;
    }

    // Helper function to get indicator arrow
    // Returns a green up arrow if value is above threshold, red down arrow if below, and yellow dash if equal
    function getIndicator(value, threshold) {
        if (value > threshold) {
        return '<i class="bi bi-arrow-up-circle-fill text-success"></i>';
        } else if (value < threshold) {
            return '<i class="bi bi-arrow-down-circle-fill text-danger"></i>';
        } else {
            return '<i class="bi bi-dash-circle-fill text-warning"></i>';
        }
    }

    // Helper function to get difficulty badge
    // Returns a badge with color based on the difficulty level (easy, medium, hard)
    function getDifficultyBadge(difficulty) {
        if (difficulty >= 4) {
            return '<span class="badge bg-danger">Hard</span>';
        } else if (difficulty >= 3) {
            return '<span class="badge bg-warning text-dark">Medium</span>';
        } else {
            return '<span class="badge bg-success">Easy</span>';
        }
    }

    // Helper function to format large numbers
    // Formats numbers above 1000 to K and above 1 million to M for better readability
    function formatNumber(num) {
        if (num >= 1000000) {
            return (num / 1000000).toFixed(1) + 'M';
        } else if (num >= 1000) {
            return (num / 1000).toFixed(1) + 'K';
        }
        return num.toString();
    }

    // Helper function to get recommendation
    // Returns a recommendation string based on the predicted points, with a star rating and advice for managers
    function getRecommendation(points) {
        const starFilled = '<i class="bi bi-star-fill text-warning"></i>';
        const starEmpty = '<i class="bi bi-star text-warning"></i>';
        
        if (points >= 7) {
            return `${starFilled}${starFilled}${starFilled}${starFilled}${starFilled} Excellent Captain Choice - High predicted points make this player a top pick!`;
        } else if (points >= 5) {
            return `${starFilled}${starFilled}${starFilled}${starFilled}${starEmpty} Strong Pick - Good predicted points, consider for your starting XI`;
        } else if (points >= 3) {
            return `${starFilled}${starFilled}${starFilled}${starEmpty}${starEmpty} Decent Option - Moderate predicted points, suitable for squad depth`;
        } else if (points >= 2) {
            return `${starFilled}${starFilled}${starEmpty}${starEmpty}${starEmpty} Risky Pick - Low predicted points, consider alternatives`;
        } else {
            return `${starFilled}${starEmpty}${starEmpty}${starEmpty}${starEmpty} Avoid - Very low predicted points, better options available`;
        }
    }

    // Function to show the error message if the api call fails
    function showError(message) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('playerProfile').style.display = 'none';
        document.getElementById('errorMessage').style.display = 'block';
        document.getElementById('errorText').textContent = message;
    }
</script>
{% endblock %}
